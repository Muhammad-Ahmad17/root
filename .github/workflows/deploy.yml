name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build all three Docker images and push them to OCIR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/frontend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/nginx:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # SSH into the OCI VM and redeploy
  # Auto-generates .env from GitHub Secrets at deployment time
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OCI VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key:      ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== Deployment Started ==="

            # Trim DEPLOY_PATH (remove trailing newlines/whitespace)
            DEPLOY_PATH=$(echo "${{ secrets.DEPLOY_PATH }}" | xargs)

            # Ensure deployment directory exists
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # Generate .env from GitHub Secrets (clean format, no extra whitespace)
            printf '%s\n' \
              'DB_NAME=${{ secrets.DB_NAME }}' \
              'DB_USER=${{ secrets.DB_USER }}' \
              'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' \
              'OCIR_REGISTRY=${{ secrets.OCIR_REGISTRY }}' \
              'OCIR_REPO=${{ secrets.OCIR_REPO }}' \
              'TAG=latest' > .env

            # Verify .env was created successfully
            if [ ! -f .env ]; then
              echo "✗ Error: .env file not created"
              exit 1
            fi
            echo "✓ .env file generated from GitHub Secrets"

            # Download docker-compose.yml from GitHub if not present
            if [ ! -f docker-compose.yml ]; then
              echo "Downloading docker-compose.yml from GitHub..."
              wget -q https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
              echo "✓ docker-compose.yml downloaded"
            fi

            # Login to OCIR on the VM using credentials from GitHub Secrets
            echo "${{ secrets.OCIR_TOKEN }}" | \
              docker login "${{ secrets.OCIR_REGISTRY }}" \
              -u "${{ secrets.OCIR_USERNAME }}" --password-stdin
            echo "✓ Logged in to OCIR"

            # Pull the latest images
            docker compose pull
            echo "✓ Images pulled from OCIR"

            # Restart containers with new images
            docker compose up -d --remove-orphans
            echo "✓ Containers started/updated"

            # Clean up old dangling images to save disk space
            docker image prune -f
            echo "✓ Old images cleaned up"

            echo "=== Deployment Complete ==="
            docker compose ps
