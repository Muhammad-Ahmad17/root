name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build all three Docker images and push them to OCIR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/frontend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/nginx:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # SSH into the OCI VM and redeploy
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OCI VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key:      ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Login to OCIR on the VM so it can pull private images
            echo "${{ secrets.OCIR_TOKEN }}" | \
              docker login "${{ secrets.OCIR_REGISTRY }}" \
              -u "${{ secrets.OCIR_USERNAME }}" --password-stdin

            cd "${{ secrets.DEPLOY_PATH }}"

            # Pull the latest images and restart changed containers only
            docker compose pull
            docker compose up -d --remove-orphans

            # Clean up old dangling images to save disk space
            docker image prune -f
