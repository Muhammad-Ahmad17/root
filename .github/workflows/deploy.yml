name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build all three Docker images and push them to OCIR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/frontend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Prepare SSL certificates for nginx
        run: |
          mkdir -p nginx/certs/cicd.aahmad.app

          echo "${{ secrets.SSL_CERTIFICATE }}" | base64 -d > nginx/certs/cicd.aahmad.app/fullchain.pem
          echo "${{ secrets.SSL_PRIVATE_KEY }}"  | base64 -d > nginx/certs/cicd.aahmad.app/privkey.pem
          echo "${{ secrets.SSL_CHAIN }}"        | base64 -d > nginx/certs/cicd.aahmad.app/chain.pem
          echo "${{ secrets.SSL_CERT }}"         | base64 -d > nginx/certs/cicd.aahmad.app/cert.pem

          ls -la nginx/certs/cicd.aahmad.app/

      - name: Build & push nginx image (with SSL certificates)
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_REPO }}/nginx:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # SSH into the OCI VM and redeploy
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OCI VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key:      ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== Deployment Started ==="

            # Trim DEPLOY_PATH (remove trailing newlines/whitespace)
            DEPLOY_PATH=$(echo "${{ secrets.DEPLOY_PATH }}" | xargs)

            # Ensure deployment directory exists
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # Generate .env from GitHub Secrets
            printf '%s\n' \
              'DB_NAME=${{ secrets.DB_NAME }}' \
              'DB_USER=${{ secrets.DB_USER }}' \
              'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' \
              'OCIR_REGISTRY=${{ secrets.OCIR_REGISTRY }}' \
              'OCIR_REPO=${{ secrets.OCIR_REPO }}' \
              'TAG=latest' > .env

            if [ ! -f .env ]; then
              echo "✗ Error: .env file not created"
              exit 1
            fi
            echo "✓ .env file generated from GitHub Secrets"

            # Always overwrite docker-compose.yml with latest from repo
            wget -q -O docker-compose.yml \
              https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
            echo "✓ docker-compose.yml updated"

            # Login to OCIR on the VM
            echo "${{ secrets.OCIR_TOKEN }}" | \
              docker login "${{ secrets.OCIR_REGISTRY }}" \
              -u "${{ secrets.OCIR_USERNAME }}" --password-stdin
            echo "✓ Logged in to OCIR"

            # Pull the latest images
            docker compose pull
            echo "✓ Images pulled from OCIR"

            # Explicitly tear down nginx so port 443 socket is fully released
            # before the new container tries to bind it
            docker compose stop nginx
            docker compose rm -f nginx
            sleep 2
            echo "✓ nginx torn down, ports released"

            # Bring all containers up with fresh images
            docker compose up -d --force-recreate --remove-orphans
            echo "✓ Containers started/updated"

            # Wait for nginx to initialize then verify both ports are bound
            sleep 5
            docker ps --filter "name=nginx" --format "{{.Ports}}" | grep -q "0.0.0.0:443" \
              || (echo "✗ Port 443 not bound! nginx logs:" && docker compose logs nginx && exit 1)
            echo "✓ Port 443 confirmed bound"

            docker ps --filter "name=nginx" --format "{{.Ports}}" | grep -q "0.0.0.0:80" \
              || (echo "✗ Port 80 not bound! nginx logs:" && docker compose logs nginx && exit 1)
            echo "✓ Port 80 confirmed bound"

            # Clean up dangling images
            docker image prune -f
            echo "✓ Old images cleaned up"

            echo "=== Deployment Complete ==="
            docker compose ps