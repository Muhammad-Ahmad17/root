services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    command: postgres -c shared_buffers=64MB -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${OCIR_REGISTRY}/${OCIR_REPO}/backend:${TAG:-latest}
    environment:
      NODE_ENV:    production
      SERVER_PORT: 5000
      PGHOST:      postgres
      PGPORT:      5432
      PGDATABASE:  ${DB_NAME}
      PGUSER:      ${DB_USER}
      PGPASSWORD:  ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${OCIR_REGISTRY}/${OCIR_REPO}/frontend:${TAG:-latest}
    environment:
      NODE_ENV: production
    restart: unless-stopped

  nginx:
    image: ${OCIR_REGISTRY}/${OCIR_REPO}/nginx:${TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
